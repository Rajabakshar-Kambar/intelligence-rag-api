services:

  # ── RAG API ──────────────────────────────────────────────────────────────────
  # Note: no local Qdrant service here — this points at the existing Qdrant
  # EC2 instance via QDRANT_HOST. Port is bound to 127.0.0.1 only; Nginx is
  # the sole public-facing process (TLS termination + rate limiting).
  rag-api:
    image: ${ECR_IMAGE}
    container_name: rag-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:8080"
    env_file:
      - .env   # generated by deploy.sh at deploy time from SSM Parameter Store, never committed
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AWS_REGION: ${AWS_REGION:-ap-south-1}
      AWS_EMBEDDING_MODEL_ID: ${AWS_EMBEDDING_MODEL_ID:-amazon.titan-embed-text-v2:0}
      AWS_CHAT_MODEL_ID: ${AWS_CHAT_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-company-documents}
      QDRANT_PORT: ${QDRANT_PORT:-6334}
      QDRANT_USE_TLS: ${QDRANT_USE_TLS:-false}
      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.65}
      # QDRANT_HOST, QDRANT_API_KEY, API_KEY come from .env (SSM-sourced) — not set here.
    logging:
      driver: awslogs
      options:
        awslogs-group: /cloudspring/rag-api
        awslogs-region: ${AWS_REGION:-ap-south-1}
        awslogs-stream: app-${HOSTNAME}
        awslogs-create-group: "false"   # log group is created explicitly in §9.1, not implicitly
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    # No AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY — the container inherits
    # the EC2 instance profile's IAM role via the standard credential chain.
