version: "3.9"

services:

  # ── Qdrant vector store ──────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:v1.9.2
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/readyz"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── RAG API ──────────────────────────────────────────────────────────────────
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rag-api
    ports:
      - "8080:8080"
    depends_on:
      qdrant:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: dev

      # AWS credentials for local development only.
      # In production, use IAM roles — do not set these environment variables.
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      AWS_REGION: ${AWS_REGION:-ap-south-1}

      AWS_EMBEDDING_MODEL_ID: ${AWS_EMBEDDING_MODEL_ID:-amazon.titan-embed-text-v2:0}
      AWS_CHAT_MODEL_ID: ${AWS_CHAT_MODEL_ID:-anthropic.claude-3-haiku-20240307-v1:0}

      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      QDRANT_COLLECTION: ${QDRANT_COLLECTION:-company-documents}
      # QDRANT_API_KEY is intentionally blank for local dev (no auth on local Qdrant)
      QDRANT_API_KEY: ""
      QDRANT_USE_TLS: "false"

      # Leave blank to disable API key auth in local dev
      API_KEY: ${API_KEY:-}

      RAG_MIN_SCORE: ${RAG_MIN_SCORE:-0.40}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/actuator/health/liveness"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

volumes:
  qdrant_data: