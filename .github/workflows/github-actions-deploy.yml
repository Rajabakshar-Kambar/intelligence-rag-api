# .github/workflows/deploy.yml
#
# Build, test, scan, push to ECR, deploy to the EC2 instance via SSM
# send-command (no SSH keys, no long-lived AWS credentials in GitHub Secrets —
# auth is via GitHub's OIDC provider assuming a scoped IAM role).

name: Build and Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write   # required for OIDC
  contents: read

env:
  AWS_REGION: ap-south-1
  ECR_REPOSITORY: cloudspring-intelligence-rag-api
  EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Build & test
        run: ./mvnw clean verify -B

      - name: OWASP dependency check
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DskipTestScope=true -B

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker build -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
                        -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" .
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"

      - name: Deploy via SSM (no SSH)
        env:
          IMAGE_TAG: ${{ github.sha }}
        run: |
          aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy rag-api $IMAGE_TAG" \
            --parameters commands="[\"cd /opt/rag-api && ./deploy.sh $IMAGE_TAG\"]" \
            --query "Command.CommandId" --output text > command_id.txt

          aws ssm wait command-executed \
            --command-id "$(cat command_id.txt)" \
            --instance-id "$EC2_INSTANCE_ID"

# Required repo secrets:
#   AWS_DEPLOY_ROLE_ARN  — IAM role trusting token.actions.githubusercontent.com,
#                          scoped (via a repo:owner/repo:ref condition) to this
#                          repository only, with ecr:* on the one repo and
#                          ssm:SendCommand + ssm:GetCommandInvocation on the
#                          one instance ARN. Not included here since it's
#                          account-specific — see DEPLOYMENT_PLAN.md §7.4 for
#                          the least-privilege pattern to follow when writing it.
#   EC2_INSTANCE_ID       — e.g. i-0123456789abcdef0
