# .github/workflows/security-scan.yml
#
# OWASP dependency-check, run on its own schedule instead of blocking every
# deploy. A transient NVD outage or a slow first-time database sync here
# only delays this report — it can never hold up a deploy.py.

name: Security Scan

on:
  schedule:
    - cron: '0 3 * * 1'   # weekly, Monday 03:00 UTC — adjust as you like
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache OWASP dependency-check database
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: ${{ runner.os }}-depcheck-db-v2-${{ github.run_id }}
          restore-keys: |
            ${{ runner.os }}-depcheck-db-v2-

      - name: OWASP dependency check
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}
        run: ./mvnw org.owasp:dependency-check-maven:check -DfailBuildOnCVSS=7 -DskipTestScope=true -B

      # Findings are also written to target/dependency-check-report.html by
      # the plugin itself. Upload it as a build artifact so you can download
      # and read it from the Actions run summary without digging through logs.
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-check-report
          path: target/dependency-check-report.html
          retention-days: 30

# Required repo secret:
#   NVD_API_KEY — from https://nvd.nist.gov/developers/request-an-api-key
#
# This workflow intentionally does NOT gate deploy.yml. If it fails (e.g. an
# actual CVE >= 7.0 CVSS is found, not just an NVD outage), you'll see a red
# X in the Actions tab for this workflow specifically — check it periodically,
# or add a repo notification/watch for failed runs of this workflow.