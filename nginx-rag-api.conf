# /etc/nginx/conf.d/rag-api.conf
#
# Reverse proxy for the CloudSpring RAG API.
# Replace YOUR_HOSTNAME with either:
#   - a real domain you own (pointed at this instance's Elastic IP), or
#   - a free wildcard hostname like <elastic-ip>.nip.io (no signup, resolves
#     automatically — see DEPLOYMENT_PLAN.md §7.3)
#
# Run `certbot --nginx -d YOUR_HOSTNAME` after this file is in place; certbot
# will rewrite the server blocks below to add the actual ssl_certificate
# directives and the HTTP->HTTPS redirect. What's shown here is the
# pre-certbot skeleton plus the application-specific hardening certbot won't
# add for you (rate limiting, security headers, actuator restriction).

limit_req_zone $binary_remote_addr zone=rag_api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name YOUR_HOSTNAME;

    # Certbot will add its ACME challenge location here automatically.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name YOUR_HOSTNAME;

    # certbot --nginx will insert ssl_certificate / ssl_certificate_key here.

    # ── Security headers ──────────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    # ── Rate limiting ─────────────────────────────────────────────────────────
    # 10 req/s per client IP with a small burst — generous enough for normal
    # use/demo, tight enough to blunt casual scraping against your Bedrock bill.
    limit_req zone=rag_api_limit burst=20 nodelay;
    limit_req_status 429;

    client_max_body_size 1m;

    # ── App routes ────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    location /swagger-ui/ {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    location /v3/api-docs {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
    }

    # ── Actuator: only expose the liveness probe publicly ───────────────────
    # metrics/prometheus/circuitbreakers/retries stay internal-only (127.0.0.1),
    # even though the app itself has them on management.endpoints.web.exposure.
    location = /actuator/health/liveness {
        proxy_pass http://127.0.0.1:8080;
    }

    location /actuator/ {
        deny all;
        return 403;
    }
}
